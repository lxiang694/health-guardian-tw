<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#1B5C3E"/>
  <title>健康守護 | 您的專屬健康管家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#F5EFE2;font-family:'Noto Sans TC',sans-serif}#loading{position:fixed;inset:0;background:#F5EFE2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}#loading .dot{width:48px;height:48px;border-radius:50%;border:4px solid #1B5C3E40;border-top-color:#1B5C3E;animation:spin 0.8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
  <div id="loading"><div class="dot"></div><div style="color:#1B5C3E;font-size:16px;font-weight:700">健康守護載入中...</div></div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script src="/app.js"></script>

  <script>
    try {
      document.getElementById('loading').style.display = 'none';
      const root = ReactDOM.createRoot(document.getElementById('root'));
      const App = (HealthApp && HealthApp.default) ? HealthApp.default : HealthApp;
      root.render(React.createElement(App));
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('root').innerHTML =
        '<div style="padding:40px;text-align:center;font-family:sans-serif">' +
        '<div style="font-size:48px">⚠️</div>' +
        '<div style="font-size:18px;margin-top:16px;color:#c0392b">Error: ' + e.message + '</div>' +
        '<div style="font-size:13px;margin-top:8px;color:#666">請檢查瀏覽器控制台</div></div>';
      console.error('Mount failed:', e);
    }
  </script>
</body>
</html>
