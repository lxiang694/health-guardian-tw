<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#1B5C3E"/>
  <title>健康守護 | 您的專屬健康管家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#F5EFE2;font-family:'Noto Sans TC',sans-serif}</style>
</head>
<body>
  <div id="root"></div>

  <!-- CDN Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <!-- App Bundle -->
  <script src="/app.js"></script>

  <!-- Mount -->
  <script>
    // Expose globals for the IIFE bundle
    window.React = window.React;
    window.ReactDOM = window.ReactDOM;

    // Mount app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HealthApp.default || HealthApp));
  </script>
</body>
</html>
